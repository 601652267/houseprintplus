pluginManagement {
    def flutterSdkPath = {
        def properties = new Properties()
        file("local.properties").withInputStream { properties.load(it) }
        def flutterSdkPath = properties.getProperty("flutter.sdk")
        assert flutterSdkPath != null, "flutter.sdk not set in local.properties"
        return flutterSdkPath
    }
    settings.ext.flutterSdkPath = flutterSdkPath()

    includeBuild("${settings.ext.flutterSdkPath}/packages/flutter_tools/gradle")

    repositories {
        google()
        mavenCentral()
        gradlePluginPortal()
    }

    plugins {
        id "dev.flutter.flutter-gradle-plugin" version "1.0.0" apply false
    }
}

plugins {
    id "dev.flutter.flutter-plugin-loader" version "1.0.0"
    id "com.android.application" version "8.1.0" apply false
    id "com.android.library" version "8.1.0" apply false
    id "org.jetbrains.kotlin.android" version "1.8.10" apply false
}

def localProperties = new Properties()
def localPropertiesFile = file("local.properties")
if (localPropertiesFile.exists()) {
    localPropertiesFile.withInputStream { localProperties.load(it) }
}

def houseprintGitMavenRepo = uri("https://raw.githubusercontent.com/601652267/printMaven/main")
def houseprintMavenUser = System.getenv("HOUSEPRINT_MAVEN_USER")
        ?: localProperties.getProperty("houseprint.maven.user")
def houseprintMavenToken = System.getenv("HOUSEPRINT_MAVEN_TOKEN")
        ?: localProperties.getProperty("houseprint.maven.token")

def configureHouseprintGitMavenRepository = { repo ->
    repo.url = houseprintGitMavenRepo
    if (houseprintMavenUser != null && houseprintMavenToken != null) {
        repo.credentials {
            username = houseprintMavenUser
            password = houseprintMavenToken
        }
        repo.authentication {
            basic(org.gradle.authentication.http.BasicAuthentication)
        }
    }
}

dependencyResolutionManagement {
    repositoriesMode.set(RepositoriesMode.PREFER_SETTINGS)
    repositories {
        google()
        mavenCentral()

        // Flutter Android 依赖
        maven { url 'https://storage.googleapis.com/download.flutter.io' }

        // Android-SpinKit
        maven { url 'https://jitpack.io' }

        // Private GitHub repository that stores the Maven directory structure.
        maven configureHouseprintGitMavenRepository

    }
}



include ":app"
